<!DOCTYPE html>
<html>
<head>
<title>Sri Maruthi Enterprises</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="invoice-box">

<h2>SRI MARUTHI ENTERPRISES</h2>
<p>(Painting, Civil, Carpentry Work)</p>
<p>Chennai - 600068</p>

<hr>

<div class="details">

<label>Bill No:</label>
<input type="text" id="billno">

<label>Date:</label>
<input type="date" id="date">

<br><br>

<label>Client Name:</label>
<input type="text" id="client">

<label>GST No:</label>
<input type="text">

<label>Address:</label>
<input type="text">

</div>

<br>

<table id="billTable">

<tr>
<th>S.No</th>
<th>Date</th>
<th>Supplier</th>
<th>Invoice No</th>
<th>Part No</th>
<th>Qty</th>
<th>Weight</th>
<th>Tonnage</th>
<th>Rate</th>
<th>Total</th>
</tr>

</table>

<button onclick="addRow()">Add Row</button>

<br><br>

<button onclick="calculateTotal()">Calculate</button>

<div class="totals">

<p id="subtotal"></p>
<p id="service"></p>
<p id="sgst"></p>
<p id="cgst"></p>

<h3 id="grandTotal"></h3>

</div>

<br>

<button onclick="window.print()">Print / Save PDF</button>

</div>

<script src="js/script.js"></script>

</body>
</html>
